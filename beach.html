<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌴 LekkerLand Vibes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Dancing+Script:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { width: 100%; height: 100%; overflow: hidden; background: #07102b; }

    canvas#beach-canvas {
      position: fixed; inset: 0;
      width: 100vw; height: 100vh;
      display: block;
    }

    /* ── Title ───────────────────────────────────────────────── */
    .beach-title-wrap {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.2rem 1rem 0;
      pointer-events: none;
      z-index: 10;
    }
    .beach-title {
      font-family: 'Pacifico', cursive;
      font-size: clamp(2rem, 6.5vw, 4.2rem);
      color: #fff;
      text-shadow:
        0 2px 6px rgba(0,0,0,0.55),
        0 0 28px rgba(255,195,50,0.75),
        0 0 60px rgba(255,110,10,0.4);
      line-height: 1.1;
    }
    .beach-subtitle {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(0.95rem, 2.8vw, 1.7rem);
      color: rgba(255,235,120,0.9);
      margin-top: 0.25rem;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    /* ── Back button ─────────────────────────────────────────── */
    .back-btn {
      position: fixed;
      top: 1.1rem; left: 1.1rem;
      z-index: 30;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      color: rgba(255,235,145,0.72);
      text-decoration: none;
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.11em;
      padding: 0.38rem 0.85rem;
      border: 1px solid rgba(255,215,80,0.28);
      border-radius: 20px;
      background: rgba(0,0,0,0.32);
      backdrop-filter: blur(8px);
      transition: all 0.22s ease;
    }
    .back-btn:hover {
      color: #FFD700;
      border-color: rgba(255,215,0,0.58);
      background: rgba(0,0,0,0.52);
      box-shadow: 0 0 14px rgba(255,200,40,0.3);
    }

    /* ── Audio player ────────────────────────────────────────── */
    .player-container {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      width: min(420px, 92vw);
      background: linear-gradient(
        148deg,
        rgba(8, 55, 12, 0.9),
        rgba(4, 30, 6, 0.94)
      );
      border: 1px solid rgba(255,200,50,0.32);
      border-radius: 1.4rem;
      padding: 1.1rem 1.4rem 1rem;
      backdrop-filter: blur(18px);
      box-shadow:
        0 8px 36px rgba(0,0,0,0.55),
        0 0 0 1px rgba(255,200,50,0.07) inset,
        0 0 50px rgba(0,90,10,0.18) inset;
    }
    .player-track-name {
      font-family: 'Pacifico', cursive;
      font-size: 0.76rem;
      color: #FFD700;
      text-align: center;
      margin-bottom: 0.85rem;
      text-shadow: 0 0 14px rgba(255,215,0,0.5);
      letter-spacing: 0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-main {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .play-btn {
      flex-shrink: 0;
      width: 50px; height: 50px;
      border-radius: 50%;
      border: 2px solid #FFD700;
      background: rgba(255,215,0,0.1);
      color: #FFD700;
      font-size: 1.15rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease;
      line-height: 1;
    }
    .play-btn:hover {
      background: rgba(255,215,0,0.26);
      box-shadow: 0 0 20px rgba(255,215,0,0.45);
      transform: scale(1.07);
    }
    .play-btn:active { transform: scale(0.95); }
    .player-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.48rem;
    }
    .player-top-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    /* EQ bars */
    .eq {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 20px;
      flex-shrink: 0;
    }
    .eq span {
      display: block;
      width: 3px;
      background: linear-gradient(to top, #00C853, #FFD700);
      border-radius: 2px 2px 0 0;
      height: 3px;
    }
    .eq.playing span:nth-child(1) { animation: eqA 0.75s ease-in-out infinite; }
    .eq.playing span:nth-child(2) { animation: eqA 0.55s ease-in-out infinite 0.12s; }
    .eq.playing span:nth-child(3) { animation: eqA 0.88s ease-in-out infinite 0.22s; }
    .eq.playing span:nth-child(4) { animation: eqA 0.6s  ease-in-out infinite 0.07s; }
    .eq.playing span:nth-child(5) { animation: eqA 0.72s ease-in-out infinite 0.18s; }
    @keyframes eqA {
      0%, 100% { height: 3px; }
      50%       { height: 18px; }
    }

    /* Progress bar */
    .progress-track {
      flex: 1;
      height: 5px;
      background: rgba(255,255,255,0.14);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00C853, #FFD700);
      border-radius: 3px;
      pointer-events: none;
      transition: width 0.1s linear;
    }
    .player-time {
      font-family: 'Courier New', monospace;
      font-size: 0.62rem;
      color: rgba(255,228,110,0.6);
      text-align: right;
    }

    /* Volume */
    .vol-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .vol-icon {
      font-size: 0.8rem;
      color: rgba(255,215,90,0.6);
      cursor: pointer;
      flex-shrink: 0;
      user-select: none;
    }
    input[type=range].vol {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      background: rgba(255,255,255,0.18);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range].vol::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 11px; height: 11px;
      border-radius: 50%;
      background: #FFD700;
      cursor: pointer;
      box-shadow: 0 0 6px rgba(255,215,0,0.5);
    }

    /* ── Rasta accent stripe ─────────────────────────────────── */
    .rasta-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg,
        #007B3E 0%, #007B3E 33.3%,
        #FFC800 33.3%, #FFC800 66.6%,
        #C0392B 66.6%, #C0392B 100%
      );
      z-index: 40;
    }

    audio { display: none; }
  </style>
</head>
<body>

  <canvas id="beach-canvas"></canvas>

  <!-- Title -->
  <div class="beach-title-wrap">
    <div class="beach-title">🌴 LekkerLand Vibes 🌴</div>
    <div class="beach-subtitle">♪ Reggae Crusade ♪</div>
  </div>

  <!-- Back button -->
  <a href="./index.html" class="back-btn">← BACK TO THE GRID</a>

  <!-- Audio player -->
  <div class="player-container">
    <div class="player-track-name">🎵 LekkerLand Vibes × Reggae Crusade</div>
    <div class="player-main">
      <button class="play-btn" id="play-btn" aria-label="Play/Pause">▶</button>
      <div class="player-right">
        <div class="player-top-row">
          <div class="eq" id="eq">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <div class="progress-track" id="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>
        <div class="player-time" id="player-time">0:00 / 0:00</div>
        <div class="vol-row">
          <span class="vol-icon" id="vol-icon">🔊</span>
          <input type="range" class="vol" id="vol" min="0" max="1" step="0.01" value="0.8" />
        </div>
      </div>
    </div>
  </div>

  <div class="rasta-bar"></div>

  <audio id="beach-audio" loop></audio>

  <script>
  // ── AUDIO ────────────────────────────────────────────────────────
  (function () {
    const audio    = document.getElementById('beach-audio');
    const playBtn  = document.getElementById('play-btn');
    const fill     = document.getElementById('progress-fill');
    const track    = document.getElementById('progress-track');
    const timeEl   = document.getElementById('player-time');
    const eq       = document.getElementById('eq');
    const volRange = document.getElementById('vol');
    const volIcon  = document.getElementById('vol-icon');

    // Set src directly — the browser URL parser handles encoding of
    // spaces, emoji and quotes in the filename automatically.
    audio.src = `music_lekkerland.mp3`;
    audio.load();
    audio.volume = 0.8;

    let playing = false;

    audio.addEventListener('error', () => {
      console.error('Audio load error:', audio.error);
      playBtn.textContent = '⚠';
      playBtn.title = 'Could not load audio file';
    });

    function fmt(s) {
      if (!isFinite(s)) return '0:00';
      return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
    }

    playBtn.addEventListener('click', () => {
      if (playing) {
        audio.pause();
        playBtn.textContent = '▶';
        eq.classList.remove('playing');
        playing = false;
      } else {
        audio.play().then(() => {
          playBtn.textContent = '⏸';
          eq.classList.add('playing');
          playing = true;
        }).catch(err => {
          console.error('Play failed:', err);
          playBtn.textContent = '⚠';
        });
      }
    });

    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
      timeEl.textContent = fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
    });

    audio.addEventListener('ended', () => {
      playBtn.textContent = '▶';
      eq.classList.remove('playing');
      playing = false;
    });

    track.addEventListener('click', e => {
      if (!audio.duration) return;
      const r = track.getBoundingClientRect();
      audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
    });

    volRange.addEventListener('input', () => {
      audio.volume = +volRange.value;
      volIcon.textContent = +volRange.value === 0 ? '🔇' : '🔊';
    });

    volIcon.addEventListener('click', () => {
      if (audio.volume > 0) {
        audio.volume = 0; volRange.value = 0; volIcon.textContent = '🔇';
      } else {
        audio.volume = 0.8; volRange.value = 0.8; volIcon.textContent = '🔊';
      }
    });
  })();

  // ── BEACH CANVAS ─────────────────────────────────────────────────
  (function () {
    const canvas = document.getElementById('beach-canvas');
    const ctx    = canvas.getContext('2d');
    let W, H, horizon, sandLine;

    function resize() {
      W        = canvas.width  = window.innerWidth;
      H        = canvas.height = window.innerHeight;
      horizon  = H * 0.47;
      sandLine = H * 0.77;
    }
    resize();
    window.addEventListener('resize', resize);

    // ── Stars ───────────────────────────────────────────────────
    const stars = Array.from({ length: 88 }, () => ({
      x: Math.random(),
      y: Math.random() * 0.44,
      r: Math.random() * 1.4 + 0.3,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 1.4 + 0.5,
    }));

    // ── Clouds ──────────────────────────────────────────────────
    const clouds = Array.from({ length: 4 }, (_, i) => ({
      x: i * 0.3 - 0.05,
      y: 0.06 + Math.random() * 0.15,
      w: 95 + Math.random() * 115,
      h: 28 + Math.random() * 22,
      speed: 0.022 + Math.random() * 0.014,   // fraction of screen width per second
      alpha: 0.16 + Math.random() * 0.14,
    }));

    // ── Seagulls ────────────────────────────────────────────────
    const gulls = Array.from({ length: 7 }, () => ({
      x: Math.random() * W,
      y: H * (0.10 + Math.random() * 0.24),
      speed: 22 + Math.random() * 32,          // px / second
      phase: Math.random() * Math.PI * 2,
      size: 7 + Math.random() * 9,
    }));

    // ── Shore foam particles ─────────────────────────────────────
    const foam = Array.from({ length: 38 }, () => ({
      x: Math.random() * 1,   // fraction of W, resolved in draw
      y: 0,
      vy: 0,
      r: Math.random() * 2.4 + 0.7,
      phase: Math.random() * Math.PI * 2,
      life: Math.random() * 2,
      maxLife: 1.8 + Math.random() * 2,
    }));

    // ── Palm-leaf descriptors (shared, mirrored for right tree) ──
    const leafData = [
      { a: -0.42, l: 0.19, s: 0.06 },
      { a: -0.82, l: 0.17, s: 0.07 },
      { a: -1.22, l: 0.14, s: 0.08 },
      { a: -1.62, l: 0.11, s: 0.09 },
      { a:  0.18, l: 0.18, s: 0.06 },
      { a:  0.58, l: 0.15, s: 0.07 },
      { a:  0.98, l: 0.13, s: 0.08 },
      { a:  1.38, l: 0.10, s: 0.10 },
    ];

    // Quadratic bezier point at parameter t
    function qpt(t, ax, ay, bx, by, cx, cy) {
      const u = 1 - t;
      return { x: u*u*ax + 2*u*t*bx + t*t*cx, y: u*u*ay + 2*u*t*by + t*t*cy };
    }

    // ── Wave y-value ─────────────────────────────────────────────
    function waveY(x, t, yBase, speed, amp) {
      return yBase
        + Math.sin(x * 0.009 + t * speed)           * amp
        + Math.sin(x * 0.018 + t * speed * 1.33 + 1) * amp * 0.37
        + Math.sin(x * 0.005 + t * speed * 0.65 + 2) * amp * 0.27;
    }

    // ── Drawing functions ─────────────────────────────────────────

    function drawSky() {
      const g = ctx.createLinearGradient(0, 0, 0, horizon);
      g.addColorStop(0,    '#07102b');
      g.addColorStop(0.32, '#17305e');
      g.addColorStop(0.63, '#8a2050');
      g.addColorStop(0.82, '#d4520a');
      g.addColorStop(1,    '#f5a420');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, horizon);
    }

    function drawStars(t) {
      stars.forEach(s => {
        const a = 0.32 + 0.36 * Math.sin(s.phase + t * s.speed);
        ctx.globalAlpha = a;
        ctx.fillStyle = '#fffde7';
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    function drawSun(t) {
      const sx = W * 0.7, sy = horizon + 1;
      const ripple = 1 + 0.028 * Math.sin(t * 2.6);

      // Atmospheric halo
      const halo = ctx.createRadialGradient(sx, sy, 0, sx, sy, H * 0.44);
      halo.addColorStop(0,    'rgba(255,168,28,0.44)');
      halo.addColorStop(0.26, 'rgba(255,88,8,0.22)');
      halo.addColorStop(0.56, 'rgba(180,28,0,0.07)');
      halo.addColorStop(1,    'rgba(0,0,0,0)');
      ctx.fillStyle = halo;
      ctx.fillRect(0, 0, W, H * 0.72);

      // Sun disk
      const sr = H * 0.065 * ripple;
      const sg = ctx.createRadialGradient(sx, sy, 0, sx, sy, sr);
      sg.addColorStop(0,   '#fffde7');
      sg.addColorStop(0.45,'#ffe082');
      sg.addColorStop(1,   '#ff8f00');
      ctx.fillStyle = sg;
      ctx.beginPath();
      ctx.arc(sx, sy, sr, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawSunReflection(t) {
      const sx = W * 0.7;
      const shim = Math.sin(t * 3.3) * W * 0.014;
      const rg = ctx.createLinearGradient(0, horizon, 0, sandLine);
      rg.addColorStop(0,   'rgba(255,138,18,0.36)');
      rg.addColorStop(0.5, 'rgba(255,98,8,0.14)');
      rg.addColorStop(1,   'rgba(255,58,0,0.02)');
      ctx.fillStyle = rg;
      ctx.beginPath();
      ctx.moveTo(sx - W * 0.035 + shim * 0.3, horizon);
      ctx.lineTo(sx + W * 0.035 + shim * 0.3, horizon);
      ctx.lineTo(sx + W * 0.13  + shim,        sandLine);
      ctx.lineTo(sx - W * 0.13  + shim,        sandLine);
      ctx.closePath();
      ctx.fill();
    }

    function drawClouds(dt) {
      clouds.forEach(c => {
        c.x += c.speed * dt;
        if (c.x > 1.35) c.x = -0.22;
        const cx = c.x * W;
        const cy = c.y * H;
        ctx.globalAlpha = c.alpha;
        ctx.fillStyle = '#ff9966';
        for (let i = 0; i < 5; i++) {
          const bx = cx + (i - 2) * c.w * 0.22;
          const br = c.h * (0.52 + Math.abs(Math.sin(i * 1.4)) * 0.48);
          ctx.beginPath();
          ctx.arc(bx, cy, br, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      });
    }

    function drawWaterLayer(t, yBase, speed, amp, color, alpha) {
      ctx.beginPath();
      ctx.moveTo(0, H);
      for (let x = 0; x <= W + 4; x += 4) {
        ctx.lineTo(x, waveY(x, t, yBase, speed, amp));
      }
      ctx.lineTo(W, H);
      ctx.closePath();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    function drawFoamCrest(t, yBase, speed, amp) {
      ctx.beginPath();
      for (let x = 0; x <= W; x += 3) {
        const y = waveY(x, t, yBase, speed, amp);
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.strokeStyle = 'rgba(255,255,255,0.55)';
      ctx.lineWidth = 1.8;
      ctx.globalAlpha = 0.42;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    function drawWater(t) {
      drawWaterLayer(t, horizon,           0.55, H*0.010, '#004d6e', 1.0);
      drawWaterLayer(t, horizon + H*0.04,  0.80, H*0.016, '#006f98', 0.88);
      drawWaterLayer(t, horizon + H*0.10,  1.10, H*0.020, '#00a0be', 0.84);
      drawWaterLayer(t, sandLine - H*0.05, 1.62, H*0.014, '#38cce4', 0.76);
      drawFoamCrest(t, horizon + H*0.04,  0.80, H*0.016);
      drawFoamCrest(t, sandLine - H*0.05, 1.62, H*0.014);
    }

    function drawSand(t) {
      const g = ctx.createLinearGradient(0, sandLine, 0, H);
      g.addColorStop(0,    '#f5e4c4');
      g.addColorStop(0.25, '#e8d4a4');
      g.addColorStop(1,    '#c6a468');
      ctx.fillStyle = g;
      ctx.fillRect(0, sandLine, W, H - sandLine);
      // Sand ripple texture
      ctx.strokeStyle = 'rgba(135,85,35,0.11)';
      ctx.lineWidth = 1;
      for (let i = 1; i <= 5; i++) {
        const y = sandLine + i * (H - sandLine) / 6;
        ctx.beginPath();
        for (let x = 0; x <= W; x += 6) {
          const ry = y + Math.sin(x * 0.042 + t * 0.18 + i * 2.1) * 2.5;
          x === 0 ? ctx.moveTo(x, ry) : ctx.lineTo(x, ry);
        }
        ctx.stroke();
      }
    }

    function drawPalmTree(rootX, rootY, flipped, swayT) {
      const trunkH = H * 0.27;
      const lean   = flipped ? 1 : -1;
      const sway   = Math.sin(swayT * 0.48) * 9 * lean;
      const tipX   = rootX + lean * trunkH * 0.37 + sway;
      const tipY   = rootY - trunkH;
      const cpX    = rootX + lean * trunkH * 0.17 + sway * 0.42;
      const cpY    = rootY - trunkH * 0.52;

      // Segmented trunk (ringed coconut-palm look)
      const SEGS = 9;
      ctx.lineCap = 'round';
      for (let i = 0; i < SEGS; i++) {
        const p0 = qpt(i / SEGS,     rootX, rootY, cpX, cpY, tipX, tipY);
        const p1 = qpt((i+1) / SEGS, rootX, rootY, cpX, cpY, tipX, tipY);
        ctx.strokeStyle = (i % 2 === 0) ? '#7a5520' : '#8c6322';
        ctx.lineWidth   = Math.max(4, 14 - i * 0.85);
        ctx.beginPath();
        ctx.moveTo(p0.x, p0.y);
        ctx.lineTo(p1.x, p1.y);
        ctx.stroke();
      }

      // Coconuts
      const nutR = H * 0.013;
      ctx.fillStyle = '#5c3a1e';
      for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.arc(tipX + i * nutR * 1.6, tipY + nutR * 0.5, nutR, 0, Math.PI * 2);
        ctx.fill();
      }

      // Leaves
      const windSway = Math.sin(swayT * 0.48) * 0.11;
      leafData.forEach((leaf, idx) => {
        const rawA = flipped ? -leaf.a : leaf.a;
        const angle = rawA + windSway * (idx % 2 === 0 ? 1 : -0.55);
        const len = leaf.l * H;
        const sag = leaf.s * H;

        const ex = tipX + Math.sin(angle) * len;
        const ey = tipY - Math.cos(angle) * len;
        const mx = (tipX + ex) / 2 + Math.cos(angle) * sag;
        const my = (tipY + ey) / 2 + sag * 0.88;

        const hue = 102 + (idx * 11) % 38;
        const lit = 28 + (idx * 4) % 18;

        // Main midrib
        ctx.strokeStyle = `hsl(${hue}, 68%, ${lit}%)`;
        ctx.lineWidth   = Math.max(1.4, 5 - idx * 0.4);
        ctx.lineCap     = 'round';
        ctx.beginPath();
        ctx.moveTo(tipX, tipY);
        ctx.quadraticCurveTo(mx, my, ex, ey);
        ctx.stroke();

        // Leaflets along midrib
        ctx.lineWidth = 1.1;
        ctx.strokeStyle = `hsl(${hue}, 54%, ${lit - 5}%)`;
        for (let j = 2; j <= 7; j++) {
          const frac = j / 8;
          const pt   = qpt(frac, tipX, tipY, mx, my, ex, ey);
          const perp = angle + Math.PI * 0.5;
          const ll   = H * 0.013 * (1 - frac * 0.44);
          ctx.beginPath();
          ctx.moveTo(pt.x + Math.sin(perp + 0.35) * ll, pt.y - Math.cos(perp + 0.35) * ll);
          ctx.lineTo(pt.x, pt.y);
          ctx.lineTo(pt.x + Math.sin(perp - 0.35) * ll, pt.y - Math.cos(perp - 0.35) * ll);
          ctx.stroke();
        }
      });
    }

    function drawSeagulls(t, dt) {
      gulls.forEach(g => {
        g.x += g.speed * dt;
        if (g.x > W + 55) g.x = -55;
        const wingA = Math.sin(t * 4.4 + g.phase);
        const s = g.size;
        ctx.globalAlpha = 0.52 + 0.22 * Math.sin(t * 0.75 + g.phase);
        ctx.strokeStyle = 'rgba(228,228,255,0.9)';
        ctx.lineWidth   = 1.5;
        ctx.lineCap     = 'round';
        ctx.beginPath();
        ctx.moveTo(g.x - s, g.y + wingA * s * 0.6);
        ctx.quadraticCurveTo(g.x - s * 0.44, g.y - wingA * s * 0.33, g.x, g.y);
        ctx.quadraticCurveTo(g.x + s * 0.44, g.y - wingA * s * 0.33, g.x + s, g.y + wingA * s * 0.6);
        ctx.stroke();
        ctx.globalAlpha = 1;
      });
    }

    function drawFoam(t, dt) {
      const shoreBase = sandLine - H * 0.05;
      const shoreAmp  = H * 0.014;
      foam.forEach(p => {
        p.life += dt;
        if (p.life > p.maxLife) {
          p.x      = Math.random();
          p.y      = waveY(p.x * W, t, shoreBase, 1.62, shoreAmp);
          p.vy     = (Math.random() - 0.5) * 9;
          p.life   = 0;
          p.maxLife = 1.6 + Math.random() * 2;
          p.r      = Math.random() * 2.3 + 0.6;
        }
        p.y  += p.vy * dt;
        p.vy *= 0.94;
        const lr = p.life / p.maxLife;
        const a  = lr < 0.2 ? lr / 0.2 : lr > 0.7 ? (1 - lr) / 0.3 : 1;
        ctx.globalAlpha = a * 0.52;
        ctx.fillStyle   = '#fff';
        ctx.beginPath();
        ctx.arc(p.x * W, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    // ── Animation loop ───────────────────────────────────────────
    let prev = 0;
    function animate(now) {
      const dt = Math.min((now - prev) / 1000, 0.05);
      prev = now;
      const t = now / 1000;

      ctx.clearRect(0, 0, W, H);

      drawSky();
      drawStars(t);
      drawSun(t);
      drawSunReflection(t);
      drawClouds(dt);
      drawWater(t);
      drawSand(t);
      drawFoam(t, dt);

      // Left palm (leans slightly right), right palm (leans slightly left)
      drawPalmTree(W * 0.052, sandLine + H * 0.006, false, t);
      drawPalmTree(W * 0.948, sandLine + H * 0.006, true,  t + 0.65);

      drawSeagulls(t, dt);

      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  })();
  </script>
</body>
